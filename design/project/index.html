<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>jide — centro de mando para Claude Code</title>
<meta name="viewport" content="width=1440">
<link rel="stylesheet" href="system/colors_and_type.css">
<style>
  /* jide animations */
  @keyframes jidePulse {
    0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    70%  { box-shadow: 0 0 0 4px transparent; opacity: 1; }
    100% { box-shadow: 0 0 0 0 transparent;   opacity: 1; }
  }
  @keyframes jideBounce {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40%           { transform: scale(1.2); opacity: 1;   }
  }
  @keyframes jideBlink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }
  html, body { margin: 0; padding: 0; height: 100%; background: #F0EEE9; overflow: hidden; }
  body { font-family: "Open Sauce One", system-ui, sans-serif; color: #1F1F1F; }
  *, *::before, *::after { box-sizing: border-box; }

  /* hide scrollbars inside artboard previews so the chrome is clean.
     Real scrollable areas (chat, terminal, file viewer) still scroll —
     the browser uses overlay scrollbars on macOS by default. */
  .dc-card *::-webkit-scrollbar { width: 6px; height: 6px; }
  .dc-card *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 3px; }
  .dc-card *::-webkit-scrollbar-track { background: transparent; }
</style>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<script type="text/babel" src="jide/overlays.jsx"></script>
<script type="text/babel" src="jide/app.jsx"></script>
<script type="text/babel" src="jide/tweaks.jsx"></script>
<script type="text/babel" src="jide/canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">

  function Page() {
